name: Build WinUI 3 artifact

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-winui:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\winui\ComputerRecoveryToolkit.WinUI\ComputerRecoveryToolkit.WinUI.csproj -r win-x64

      - name: Build
        run: dotnet build .\winui\ComputerRecoveryToolkit.WinUI\ComputerRecoveryToolkit.WinUI.csproj -c Release -p:Platform=x64 --no-restore

      - name: Package portable test artifact
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          .\scripts\Package-WinUIRelease.ps1 -PackageName ComputerRecoveryToolkit-WinUI3-portable-win-x64-ci

      - name: Upload WinUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComputerRecoveryToolkit-WinUI3-portable-win-x64-ci
          path: |
            .\artifacts\ComputerRecoveryToolkit-WinUI3-portable-win-x64-ci.zip
            .\artifacts\SHA256SUMS.txt
          if-no-files-found: error
