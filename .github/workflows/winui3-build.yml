name: Build WinUI 3 artifact

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-winui:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\winui\ComputerRecoveryToolkit.WinUI\ComputerRecoveryToolkit.WinUI.csproj -r win-x64

      - name: Build
        run: dotnet build .\winui\ComputerRecoveryToolkit.WinUI\ComputerRecoveryToolkit.WinUI.csproj -c Release -p:Platform=x64 --no-restore

      - name: Publish portable artifact
        run: >
          dotnet publish .\winui\ComputerRecoveryToolkit.WinUI\ComputerRecoveryToolkit.WinUI.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Platform=x64
          -p:WindowsPackageType=None
          -o .\artifacts\ComputerRecoveryToolkit-WinUI3-windows-x64

      - name: Sign artifact if certificate secrets exist
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.CODESIGN_PFX_BASE64 }}
          CODESIGN_PFX_PASSWORD: ${{ secrets.CODESIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CODESIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:CODESIGN_PFX_PASSWORD)) {
            Write-Host "Code signing secrets not configured; publishing unsigned artifact."
            exit 0
          }
          .\scripts\Sign-WindowsArtifact.ps1 -ArtifactDir .\artifacts\ComputerRecoveryToolkit-WinUI3-windows-x64

      - name: Upload WinUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ComputerRecoveryToolkit-WinUI3-windows-x64
          path: .\artifacts\ComputerRecoveryToolkit-WinUI3-windows-x64
          if-no-files-found: error
